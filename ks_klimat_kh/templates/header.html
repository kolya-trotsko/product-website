{% load static %}

<div class="header-container">
    <header class="nav">
        <a href="{% url 'home' %}" class="nav-logo" aria-label="KS Klimat KH">
            <img src="{{ MEDIA_URL }}logos/ks_klimat_kh.PNG" alt="Logo">
        </a>

        <div class="nav-right">
            <ul class="nav-menu">
                <li class="nav-item"><a href="{% url 'home' %}" class="nav-link">Головна</a></li>
                <li class="nav-item"><a href="{% url 'catalog' %}" class="nav-link">Каталог</a></li>
                <li class="nav-item"><a href="{% url 'service' %}" class="nav-link">Послуги</a></li>
                <li class="nav-item"><a href="{% url 'policy' %}" class="nav-link">Політика</a></li>

                {% if user.is_authenticated %}
                    {% if user.is_staff %}
                    <li class="nav-item"><a href="{% url 'admin:index' %}" class="nav-link">Адмін</a></li>
                    {% endif %}
                    <li class="nav-item"><a href="{% url 'account_logout' %}" class="nav-link">Вийти</a></li>
                {% else %}
                    <li class="nav-item"><a href="{% url 'account_login' %}" class="nav-link">Вхід</a></li>
                {% endif %}
            </ul>

            {% if header_phone %}
                <a class="nav-phone" href="tel:{{ header_phone_href }}" aria-label="Подзвонити {{ header_phone }}">
                    <svg class="nav-phone-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.4 19.4 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.7.6 2.5a2 2 0 0 1-.5 2.1L8 9.5a16 16 0 0 0 6.5 6.5l1.2-1.2a2 2 0 0 1 2.1-.5c.8.3 1.6.5 2.5.6A2 2 0 0 1 22 16.9z"></path>
                    </svg>
                    <span>{{ header_phone }}</span>
                </a>
            {% endif %}

        </div>
    </header>
</div>
